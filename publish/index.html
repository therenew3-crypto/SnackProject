/* ===================== 포맷: 원화 → 조/억/만원 ===================== */
function formatKRW(won){
  const neg = won < 0; won = Math.abs(Math.round(won));
  if (won === 0) return "0원";
  const 조 = Math.floor(won/1e12), 억 = Math.floor((won%1e12)/1e8), 만 = Math.floor((won%1e8)/1e4), 원 = won%1e4;
  let parts = [];
  if (조) parts.push(조+"조");
  if (억) parts.push(억+"억");
  if (만) parts.push(fmtNum(만)+"만");
  if (원 && !조 && !억) parts.push(fmtNum(원));
  let s = parts.join(" ") + "원";
  return (neg ? "-" : "") + s;
}

function wittyMessage(ratio){
  const band = MSG_BANDS.find(b => ratio < b.max) || MSG_BANDS[MSG_BANDS.length - 1];
  const m = band.pool[Math.floor(Math.random() * band.pool.length)];
  return m.replace(/\{x\}/g, ratio.toFixed(1));
}

/* ===================== 계산 ===================== */
function compute(){
  const aKey = assetSel.value, a = ASSETS[aKey];
  const bKey = buySel.value;
  const buyPrice = a[bKey];
  const amount = parseInt((amountEl.value||"0").replace(/[^0-9]/g,''),10) || 0;

  const sp = SELL_POINTS[sellIdx];
  const sellPrice = SELLS[aKey][sp.key];

  if (!amount) { alert("투자할 금액을 입력해 주세요! 💰"); return null; }
  if (buyPrice == null) {
    alert(`${a.name}은(는) ${TIMEMAP[bKey].date} 시점엔 아직 세상에 없었어요. 😅\n(상장·출시 이전)\n다른 시점이나 다른 자산을 골라보세요!`);
    return null;
  }
  if (sp.t <= buyT(bKey)) {
    alert(`⏰ 매도 시점(${sp.label})이 매수 시점보다 빠르거나 같아요!\n사기 전에 팔 수는 없잖아요. 매도 시점을 더 미래로 옮겨주세요.`);
    return null;
  }
  if (sellPrice == null) {
    alert(`${a.name}은(는) ${sp.label} 시점엔 아직 데이터가 없어요. 😅\n다른 매도 시점을 골라주세요!`);
    return null;
  }

  const finalWon = amount * (sellPrice / buyPrice);
  const profit = finalWon - amount;
  const ratio = (sellPrice / buyPrice);

  return {
    a, aKey, bKey, amount, finalWon, profit, ratio,
    idx: sellIdx, sellLabel: sp.label
  };
}

/* 결과를 URL 쿼리로 인코딩 (공유 링크 → 같은 결과 재현) */
function resultParams(r){

}
function resultUrl(r){
  const base = /^https?:/i.test(location.href) ? (location.origin + location.pathname) : '';
  return base ? base + '?' + resultParams(r) : '';
}

  const g = grade(r.finalWon);
  document.getElementById('gradeEmoji').textContent = g.emoji;
  const gn = document.getElementById('gradeName'); gn.textContent = g.name; gn.className = "text-sm font-bold tracking-widest mb-4 " + g.color;

  document.getElementById('rAsset').textContent = r.a.name;
  document.getElementById('rBuyTime').textContent = timeLabel(r.bKey);
  document.getElementById('rAmount').textContent = formatKRW(r.amount);
  document.getElementById('rSellTime').textContent = r.sellLabel;

  const up = r.profit >= 0;
  const pf = document.getElementById('rProfit');
  pf.textContent = (up?"+":"") + formatKRW(r.profit);
  pf.className = "font-bold " + (up ? "text-up" : "text-down");

  const pct = ((r.ratio - 1) * 100);
  const badge = document.getElementById('returnBadge');
  badge.textContent = (up?"▲ ":"▼ ") + (up?"수익률 +":"수익률 ") + fmtNum(Math.round(pct)) + "% (" + r.ratio.toFixed(1) + "배)";
  badge.className = "inline-block text-sm font-bold px-3 py-1 rounded-full mb-5 " + (up ? "bg-up/15 text-up" : "bg-down/15 text-down");

  document.getElementById('gradeMsg').textContent = wittyMessage(r.ratio);

  // 결과 카드 색 강조 + 화면 전환 (연출보다 먼저 — 무슨 일이 있어도 결과는 보이게)
  const card = document.getElementById('resultCard');
  card.className = "glass rounded-3xl p-7 text-center pop " + (g.key==="rich" ? "gold-glow" : "");

  document.getElementById('form-view').classList.add('hidden');
  document.getElementById('result-view').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
  window.__lastResult = r;

  // 카운트업 애니메이션 + 대부호 컨페티
  animateNumber(document.getElementById('finalAmount'), r.finalWon);
  if (g.key === "rich") confetti();
}

/* ===================== 컨페티 연출 ===================== */
function confetti(){
  const colors = ['#FFD700','#ff4d4f','#3b82f6','#22c55e','#f59e0b','#ffffff'];
  for (let i = 0; i < 80; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (Math.random() * 100) + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.borderRadius = (i % 2 ? '50%' : '2px');
    c.style.animation = `fall ${2 + Math.random() * 2}s linear ${Math.random() * 0.4}s forwards`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4600);
  }
}

function animateNumber(el, target){
  const dur = 1100, start = performance.now();
  function step(now){
    const t = Math.min((now-start)/dur, 1);
    const eased = 1 - Math.pow(1-t, 3);
    el.textContent = formatKRW(target * eased);
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = formatKRW(target);
  }
  requestAnimationFrame(step);
}

   ※ 단위코드는 adfit.kakao.com 발급값. 전면광고는 모달이 '보인 뒤' 로드해야 렌더됨. */
const ADFIT_BANNER_320 = "DAN-LLpWlk1ICCATK0lQ";  // 상단 배너 (320x100) — 채움 잘됨
const ADFIT_BOTTOM     = "DAN-8QjyorrOVw0Bv1mE";  // 하단 사각 (300x250) — 채움 잘됨
const ADFIT_INTER      = "DAN-ZgUPJJ8bggSaB8rn";  // 팝업 전면 (250x250) — 채움 잘되는 사이즈

function isRealUnit(u){ return /^DAN-[A-Za-z0-9]{8,}$/.test(u || ""); }

const ADFIT_SRC = 'https://t1.daumcdn.net/kas/static/ba.min.js';

function makeIns(unit, w, h){
  const ins = document.createElement('ins');
  ins.className = 'kakao_ad_area';
  ins.style.display = 'none';
  ins.setAttribute('data-ad-unit', unit);
  ins.setAttribute('data-ad-width', String(w));
  ins.setAttribute('data-ad-height', String(h));
  return ins;
}

// 항상 노출 배너: ins를 DOM에 미리 넣어두면 SDK 로드 시 자동 스캔·렌더된다
function placeBanner(container, unit, w, h){
  if (!container || !isRealUnit(unit)) return;
  container.innerHTML = "";
  container.appendChild(makeIns(unit, w, h));
  // 일정 시간 내 안 채워지면(노필) 영역을 접어 빈 칸 방지
  let t = 0;
  const iv = setInterval(() => {
    if (container.querySelector('iframe')){ clearInterval(iv); }
    else if (++t > 12){ container.style.display = 'none'; clearInterval(iv); }
  }, 600);
}
placeBanner(document.getElementById('adTop'), ADFIT_BANNER_320, 320, 100);
placeBanner(document.getElementById('adBottom'), ADFIT_BOTTOM, 300, 250);

//   → 나중에 추가되는 팝업 광고는 스크립트 재삽입이 아니라 render API로 직접 렌더해야 함)
(function loadAdfitSdkOnce(){
  if (document.querySelector('script[src*="ba.min.js"]')) return;
  const s = document.createElement('script');
  s.src = ADFIT_SRC; s.async = true;

   모달을 display:none 이 아니라 opacity 로 숨기므로(아래 calcBtn) 광고 영역이
   레이아웃상 살아있어 SDK 초기 스캔이 정상 렌더한다. (동적 render API는 불안정해 미사용) */
(function placeInterstitialAd(){

  m.classList.add('opacity-0','pointer-events-none');
  m.classList.remove('opacity-100','pointer-events-auto');
}
document.getElementById('calcBtn').addEventListener('click', () => {
  const r = compute();
  if (!r) return;
  const countEl = document.getElementById('adCount');
  showAdModal();
  let n = 3; countEl.textContent = n;
  const iv = setInterval(() => {
    n--; countEl.textContent = n;
    if (n <= 0){
      clearInterval(iv);
      hideAdModal();
      render(r);
    }
  }, 1000);
});

/* ===================== 다시하기 ===================== */
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('form-view').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ===================== 공유 ===================== */
document.getElementById('shareBtn').addEventListener('click', async () => {
  const r = window.__lastResult; if (!r) return;
  const g = grade(r.finalWon);
  const text =
`⏳ IF 계좌 계산기 결과 ${g.emoji}
${r.a.name}을(를) ${TIMEMAP[r.bKey].date}(${TIMEMAP[r.bKey].story})에 ${formatKRW(r.amount)} 샀다면?
👉 ${r.sellLabel} 매도 시: ${formatKRW(r.finalWon)} (${r.ratio.toFixed(1)}배!)
[${g.name.replace(/ /g,'')}]
너도 해봐 👇`;

  // 결과가 담긴 링크 (열면 같은 결과가 자동 표시됨)
  // file:// 같은 비보안 컨텍스트에서 navigator.share 를 호출하면 렌더러가
  // 강제 종료(RESULT_CODE_KILLED_BAD_MESSAGE)되므로, http(s)에서만 사용한다.
  const httpUrl = resultUrl(r);
  const payload = text + (httpUrl ? "\n" + httpUrl : "");

  if (httpUrl && navigator.share && (!navigator.canShare || navigator.canShare({ text }))) {
    try { await navigator.share({ title:"IF 계좌 계산기", text, url: httpUrl }); return; }
    catch(e){ if (e && e.name === 'AbortError') return; /* 그 외엔 복사로 폴백 */ }
  }

  // 클립보드 복사 (보안 컨텍스트) → 실패 시 execCommand → prompt 순 폴백
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(payload);
      alert("결과가 복사됐어요! 카카오톡에 붙여넣기 하세요 📋");
      return;
    }
    throw new Error('clipboard unavailable');
  } catch(e){
    const ta = document.createElement('textarea');
    ta.value = payload;
    ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch(_){}
    document.body.removeChild(ta);
    if (ok) alert("결과가 복사됐어요! 카카오톡에 붙여넣기 하세요 📋");
    else prompt("아래 내용을 복사해 공유하세요:", payload);
  }
});

/* ===================== 공유 링크로 진입 시 결과 자동 표시 ===================== */
(function initFromUrl(){
  const p = new URLSearchParams(location.search);
  const a = p.get('a');
  if (!a || !ASSETS[a]) return;                       // 파라미터 없으면 일반 진입
  const b = p.get('b');
  const amt = parseInt(p.get('amt') || '0', 10);
  const s = parseInt(p.get('s') || '10', 10);
  if (!TIMEMAP[b] || !amt) return;
  assetSel.value = a;
  buySel.value = b;
  amountEl.value = fmtNum(amt);
  if (s >= 0 && s < SELL_POINTS.length){
    sellIdx = s; sellRange.value = s; sellLabelEl.textContent = SELL_POINTS[s].label;
  }
  const r = compute();
  if (r) render(r);                                   // 광고 모달 없이 바로 결과부터 보여줌
})();
</script>
