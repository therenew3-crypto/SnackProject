/* ===================== 데이터셋 (엔터테인먼트용 근사치) =====================

   미국 주식은 액면분할 반영(split-adjusted) 근사치.                           */
/* 매수 가능한 시점 — 구체적 날짜 + 스토리 (시간순). null이면 해당 자산 미존재 */

/* 가격: 미국주식·코인=USD, 한국주식=KRW. 비율 계산이라 통화 무관.

     · 미국주식·코인: yfinance 수정종가(액면분할·배당 반영)

   key 순서: 2015.01 / 2017.12 / 2018.12 / 2020.03 / 2021.11 / 2022.01 / 2022.11 / 2023.01 / 2024.01 / 2025.01 / now / ath

// 매수 시점 key("d20150102") → 정렬용 YYYYMM(201501)
const buyT = key => parseInt(key.slice(1, 7), 10);

/* ===================== 상태 ===================== */
let sellIdx = 10; // SELL_POINTS 인덱스 (기본: 현재)

/* ===================== 셀렉트 채우기 (카테고리별 그룹) ===================== */
const assetSel = document.getElementById('asset');
const CAT_ORDER = ["한국주식", "미국주식", "코인", "금·원자재"]; // 드롭다운 표시 순서
const cats = {};
Object.entries(ASSETS).forEach(([k,v]) => { (cats[v.cat] ||= []).push([k,v]); });
const orderedCats = [...CAT_ORDER, ...Object.keys(cats).filter(c => !CAT_ORDER.includes(c))];
orderedCats.forEach(cat => {
  const list = cats[cat];
  if (!list) return;
  const og = document.createElement('optgroup'); og.label = cat;
  list.forEach(([k,v]) => {
    const o = document.createElement('option'); o.value = k; o.textContent = `${v.emoji}  ${v.name}`; og.appendChild(o);
  });
  assetSel.appendChild(og);
});
const buySel = document.getElementById('buyTime');
TIMES.forEach(t => {
  const o = document.createElement('option'); o.value = t.key; o.textContent = `${t.date} · ${t.story}`; buySel.appendChild(o);
});

/* ===================== 입력 편의 ===================== */
const amountEl = document.getElementById('amount');
const fmtNum = n => n.toLocaleString('ko-KR');
amountEl.addEventListener('input', e => {
  const raw = e.target.value.replace(/[^0-9]/g,'');
  e.target.value = raw ? fmtNum(parseInt(raw,10)) : '';
});
document.querySelectorAll('.quick').forEach(b => b.addEventListener('click', () => {
  amountEl.value = fmtNum(parseInt(b.dataset.amt,10));
}));

const sellRange = document.getElementById('sellRange');
const sellLabelEl = document.getElementById('sellLabel');
sellRange.addEventListener('input', () => {
  sellIdx = parseInt(sellRange.value, 10);
  sellLabelEl.textContent = SELL_POINTS[sellIdx].label;
});

/* ===================== 포맷: 원화 → 조/억/만원 ===================== */
function formatKRW(won){
  const neg = won < 0; won = Math.abs(Math.round(won));
  if (won === 0) return "0원";
  const 조 = Math.floor(won/1e12), 억 = Math.floor((won%1e12)/1e8), 만 = Math.floor((won%1e8)/1e4), 원 = won%1e4;
  let parts = [];
  if (조) parts.push(조+"조");
  if (억) parts.push(억+"억");
  if (만) parts.push(fmtNum(만)+"만");
  if (원 && !조 && !억) parts.push(fmtNum(원));
  let s = parts.join(" ") + "원";
  return (neg ? "-" : "") + s;
}

/* ===================== 등급 판정 ===================== */
function grade(won){
  if (won >= 1e9) return {
    key:"rich", emoji:"👑", name:"대 부 호  등 급",
    msg:"타임패러독스 유발자! 당장 사직서를 인쇄하고 회장님 뺨을 때리러 가세요.",
    color:"text-gold"
  };
  if (won >= 1e8) return {
    key:"mid", emoji:"🏢", name:"중 산 층  등 급",
    msg:"강남 아파트 계약금은 벌었네요. 조금만 더 과감했으면 좋았을 걸!",
    color:"text-gold"
  };
  return {
    key:"ant", emoji:"🐜", name:"개 미  등 급",
    msg:"예금자보호법 매니아. 과거로 돌아가서 고작 이만큼 사셨나요? 그냥 현실에 충실하세요.",
    color:"text-gray-300"
  };
}

/* ===================== 계산 ===================== */
function compute(){
  const aKey = assetSel.value, a = ASSETS[aKey];
  const bKey = buySel.value;
  const buyPrice = a[bKey];
  const amount = parseInt((amountEl.value||"0").replace(/[^0-9]/g,''),10) || 0;

  const sp = SELL_POINTS[sellIdx];
  const sellPrice = SELLS[aKey][sp.key];

  if (!amount) { alert("투자할 금액을 입력해 주세요! 💰"); return null; }
  if (buyPrice == null) {
    alert(`${a.name}은(는) ${TIMEMAP[bKey].date} 시점엔 아직 세상에 없었어요. 😅\n(상장·출시 이전)\n다른 시점이나 다른 자산을 골라보세요!`);
    return null;
  }
  if (sp.t <= buyT(bKey)) {
    alert(`⏰ 매도 시점(${sp.label})이 매수 시점보다 빠르거나 같아요!\n사기 전에 팔 수는 없잖아요. 매도 시점을 더 미래로 옮겨주세요.`);
    return null;
  }
  if (sellPrice == null) {
    alert(`${a.name}은(는) ${sp.label} 시점엔 아직 데이터가 없어요. 😅\n다른 매도 시점을 골라주세요!`);
    return null;
  }

  const finalWon = amount * (sellPrice / buyPrice);
  const profit = finalWon - amount;
  const ratio = (sellPrice / buyPrice);

  return {
    a, aKey, bKey, amount, finalWon, profit, ratio,
    sellLabel: sp.label
  };
}

/* ===================== 결과 렌더 ===================== */
function render(r){
  const g = grade(r.finalWon);
  document.getElementById('gradeEmoji').textContent = g.emoji;
  const gn = document.getElementById('gradeName'); gn.textContent = g.name; gn.className = "text-sm font-bold tracking-widest mb-4 " + g.color;

  document.getElementById('rAsset').textContent = r.a.name;
  document.getElementById('rBuyTime').textContent = timeLabel(r.bKey);
  document.getElementById('rAmount').textContent = formatKRW(r.amount);
  document.getElementById('rSellTime').textContent = r.sellLabel;

  const up = r.profit >= 0;
  const pf = document.getElementById('rProfit');
  pf.textContent = (up?"+":"") + formatKRW(r.profit);
  pf.className = "font-bold " + (up ? "text-up" : "text-down");

  const pct = ((r.ratio - 1) * 100);
  const badge = document.getElementById('returnBadge');
  badge.textContent = (up?"▲ ":"▼ ") + (up?"수익률 +":"수익률 ") + fmtNum(Math.round(pct)) + "% (" + r.ratio.toFixed(1) + "배)";
  badge.className = "inline-block text-sm font-bold px-3 py-1 rounded-full mb-5 " + (up ? "bg-up/15 text-up" : "bg-down/15 text-down");

  document.getElementById('gradeMsg').textContent = g.msg;

  // 결과 카드 색 강조 + 화면 전환 (연출보다 먼저 — 무슨 일이 있어도 결과는 보이게)
  const card = document.getElementById('resultCard');
  card.className = "glass rounded-3xl p-7 text-center pop " + (g.key==="rich" ? "gold-glow" : "");

  document.getElementById('form-view').classList.add('hidden');
  document.getElementById('result-view').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
  window.__lastResult = r;

  // 카운트업 애니메이션 + 대부호 컨페티
  animateNumber(document.getElementById('finalAmount'), r.finalWon);
  if (g.key === "rich") confetti();
}

/* ===================== 컨페티 연출 ===================== */
function confetti(){
  const colors = ['#FFD700','#ff4d4f','#3b82f6','#22c55e','#f59e0b','#ffffff'];
  for (let i = 0; i < 80; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (Math.random() * 100) + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.borderRadius = (i % 2 ? '50%' : '2px');
    c.style.animation = `fall ${2 + Math.random() * 2}s linear ${Math.random() * 0.4}s forwards`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4600);
  }
}

function animateNumber(el, target){
  const dur = 1100, start = performance.now();
  function step(now){
    const t = Math.min((now-start)/dur, 1);
    const eased = 1 - Math.pow(1-t, 3);
    el.textContent = formatKRW(target * eased);
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = formatKRW(target);
  }
  requestAnimationFrame(step);
}

/* ===================== 카카오 애드핏 광고 (하이브리드) =====================
   상단 배너·하단 사각은 항상 노출, 320x480은 결과 직전 전면(인터스티셜)으로 노출.
   ※ 단위코드는 adfit.kakao.com 발급값. 전면광고는 모달이 '보인 뒤' 로드해야 렌더됨. */
const ADFIT_BANNER_320 = "DAN-LLpWlk1ICCATK0lQ";  // 상단 배너 (320x100) — 항상 노출
const ADFIT_RECT_300   = "DAN-8QjyorrOVw0Bv1mE";  // 하단 사각 (300x250) — 항상 노출
const ADFIT_INTER      = "DAN-z7X3S5Y4Xp9L5HFI";  // 전면 인터스티셜 (320x480) — 결과 직전

function isRealUnit(u){ return /^DAN-[A-Za-z0-9]{8,}$/.test(u || ""); }

function loadAdfit(container, unit, w, h){
  if (!container) return;
  if (!isRealUnit(unit)) return;          // 코드 미설정 → 안내 문구 유지
  container.innerHTML = "";               // 이전 광고/문구 정리(중복 방지)
  const ins = document.createElement('ins');
  ins.className = 'kakao_ad_area';
  ins.style.display = 'none';
  ins.setAttribute('data-ad-unit', unit);
  ins.setAttribute('data-ad-width', String(w));
  ins.setAttribute('data-ad-height', String(h));
  container.appendChild(ins);
  const s = document.createElement('script');
  s.src = 'https://t1.daumcdn.net/kas/static/ba.min.js';
  s.async = true;
  container.appendChild(s);              // 삽입 후 스크립트가 영역을 스캔·렌더
}

// 상단 배너 + 하단 사각: 페이지 로드 시 각 1회 (둘 다 항상 보임)
loadAdfit(document.getElementById('adTop'), ADFIT_BANNER_320, 320, 100);
loadAdfit(document.getElementById('adBottom'), ADFIT_RECT_300, 300, 250);

/* ===================== 결과 확인 → 전면광고 3초 → 결과 =====================
   순서 중요: 모달을 먼저 '보이게' 한 뒤 광고를 로드해야 정상 렌더된다. */
document.getElementById('calcBtn').addEventListener('click', () => {
  const r = compute();
  if (!r) return;
  const modal = document.getElementById('adModal');
  const countEl = document.getElementById('adCount');
  modal.classList.remove('hidden');                                    // 1) 먼저 보이게
  loadAdfit(document.getElementById('adSlot'), ADFIT_INTER, 320, 480); // 2) 그다음 로드
  let n = 3; countEl.textContent = n;
  const iv = setInterval(() => {
    n--; countEl.textContent = n;
    if (n <= 0){
      clearInterval(iv);
      modal.classList.add('hidden');
      render(r);
    }
  }, 1000);
});

/* ===================== 다시하기 ===================== */
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('form-view').classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ===================== 공유 ===================== */
document.getElementById('shareBtn').addEventListener('click', async () => {
  const r = window.__lastResult; if (!r) return;
  const g = grade(r.finalWon);
  const text =
`⏳ IF 계좌 계산기 결과 ${g.emoji}
${r.a.name}을(를) ${TIMEMAP[r.bKey].date}(${TIMEMAP[r.bKey].story})에 ${formatKRW(r.amount)} 샀다면?
👉 ${r.sellLabel} 매도 시: ${formatKRW(r.finalWon)} (${r.ratio.toFixed(1)}배!)
[${g.name.replace(/ /g,'')}]
너도 해봐 👇`;

  // 실제 서비스에서는 Kakao SDK (Kakao.Share.sendDefault) 연동.
  // file:// 같은 비보안 컨텍스트에서 navigator.share 를 호출하면 렌더러가
  // 강제 종료(RESULT_CODE_KILLED_BAD_MESSAGE)되므로, http(s)에서만 사용한다.
  const httpUrl = /^https?:/i.test(location.href) ? location.href : '';
  const payload = text + (httpUrl ? "\n" + httpUrl : "");

  if (httpUrl && navigator.share && (!navigator.canShare || navigator.canShare({ text }))) {
    try { await navigator.share({ title:"IF 계좌 계산기", text, url: httpUrl }); return; }
    catch(e){ if (e && e.name === 'AbortError') return; /* 그 외엔 복사로 폴백 */ }
  }

  // 클립보드 복사 (보안 컨텍스트) → 실패 시 execCommand → prompt 순 폴백
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(payload);
      alert("결과가 복사됐어요! 카카오톡에 붙여넣기 하세요 📋");
      return;
    }
    throw new Error('clipboard unavailable');
  } catch(e){
    const ta = document.createElement('textarea');
    ta.value = payload;
    ta.style.position = 'fixed'; ta.style.top = '0'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch(_){}
    document.body.removeChild(ta);
    if (ok) alert("결과가 복사됐어요! 카카오톡에 붙여넣기 하세요 📋");
    else prompt("아래 내용을 복사해 공유하세요:", payload);
  }
});
</script>
